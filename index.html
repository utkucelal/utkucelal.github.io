<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="icon" href="icon16.png">
    <title>pomodoro şeysi</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script src="popup.js"></script>
  </head>
  <body id="backgroundBody">

    <div id="pomodoro-app">
        <div id="container">
          <div id="timer">
            <div id="time">
              <span id="minutes">25</span>
              <span id="colon">:</span>
              <span id="seconds">00</span>
            </div>
            <div id="filler"></div>
          </div>
      
          <div id="buttons">
            <button id="work">başla</button>
            <button id="shortBreak">kısa mola</button>
            <button id="longBreak">uzun mola</button>
            <button id="stop">durdur</button>
          </div>
          <br><strong>çalışırken dinelenbilecek müzikler:</strong></br>
          <div id="playlist-buttons">
            <a href="https://open.spotify.com/playlist/68SnZbXzIJ1xT1dFghWvOA"><img alt="fast travel playlisti" id="fastrvl-btn" src="fastrvl.jpg"></a>
            <a href="https://open.spotify.com/playlist/3uWyL6C66CGrRetfSdukED"><img alt="carpe diem playlisti" id="carped-btn" src="carped.jpg"></a>
            <a href="https://www.youtube.com/watch?v=jfKfPfyJRdk"><img alt="lofi girl canlı 7/24 yayını" id="lofi-btn" src="lofi.jpg"></a>
          </div>

        </div>
      </div>

    <div id="ders" class="derscontainer">
      <h3>Bugün ne çalışıyoruz paşam</h3>
        <label>
          <input type="checkbox" class="checkmark" name="subject" id="matematik" value="matematik"> Matematik
        </label><br>
        <label>
          <input type="checkbox" class="checkmark" name="subject" id="biyoloji" value="biyoloji"> Biyoloji
        </label><br>
        <label>
          <input type="checkbox" class="checkmark" name="subject" id="fizik" value="fizik"> Fizik
        </label><br>
        <label>
          <input type="checkbox" class="checkmark" name="subject" id="kimya" value="kimya"> Kimya
        </label><br>
        <label>
        <button id="start-btn" class="button">Tamamdır Başlayalım</button>
    </div>
  </body>
</html>
